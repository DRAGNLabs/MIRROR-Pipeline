data:
  class_path: WikitextDataset
  init_args:
    split: train
    head: 10

# val_data:
#   class_path: WikitextDataset
#   init_args:
#     split: validation
#     head: 5

# val_check_interval: 1

# test_data:
#   class_path: WikitextDataset
#   init_args:
#     split: test
#     head: 5

do_preprocess: True

# preprocessor: 
#   class_path: MirrorLlamaPreprocessor

# interventions:
#   class_path: ZeroMLPIntervention
  
# configure_scheduler:
#   class_path: CosineAnnealingScheduler

model:
  # class_path: mirror.models.mirror_gpt_model.MirrorGPTModel
  # init_args:
  #   weights: pretrained

  class_path: mirror.models.mirror_llama_model.MirrorLlamaModel
  init_args:
    initialization:
      # 3.2-1B

      # 3.2-1B-Instruct

      vocab_size: 128256 # Default: 128256 | 50257 for GPTPreprocessor | 8000 for BabblePreprocessor
      hidden_size: 128 # Default: 4096 | 128 for BabblePreprocessor
      intermediate_size: 340 # Default: 11008 | 340 for BabblePreprocessor
      num_hidden_layers: 6 # Default: 32 | 6 for BabblePreprocessor
      num_attention_heads: 4  # Default: 32 | 4 for Preprocessor
      num_key_value_heads: null # Default: null

slurm:
  job_type: "compute" # "local" "local-download"
  time: "01:00:00"
  gpus_per_node: p100:1 
  nodes: null
  mem_per_cpu: "128G"
  output: "slurm_logs/%j.out"
  open_mode: "append"
  signal: "SIGHUP@90"
  requeue: true
  qos: # dw87

epochs: 1
batch_size: 1
device: cuda
