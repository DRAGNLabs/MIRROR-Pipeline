data:
  class_path: 
    TxtDataset
  init_args:
    file_path: /home/jansen05/nobackup/autodelete/mirror_data/datasets/church-english.txt
    head: 100

model:
  class_path: mirror.models.mirror_llama_model.MirrorLlamaModel
  init_args:
    initialization:
      vocab_size: 128256 # Default: 128256
      hidden_size: 512 # Default: 4096
      intermediate_size: 1024 # Default: 11008
      num_hidden_layers: 4 # Default: 32
      num_attention_heads: 4  # Default: 32
      num_key_value_heads: null # Default: null

slurm:
  job_type: "compute" # "local" "local-download"
  time: "01:00:00"
  gpus_per_node: h200:1
  mem_per_cpu: "128G"
  output: "slurm_logs/%j.out"
  open_mode: "append"
  signal: "SIGHUP@90"
  requeue: true

epochs: 1
batch_size: 1
device: cpu
