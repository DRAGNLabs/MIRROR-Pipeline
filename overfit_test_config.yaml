data:
  class_path: WikitextDataset
  init_args:
    split: train
    head: 1

model:
  class_path: mirror.models.mirror_llama_model.MirrorLlamaModel
  init_args:
    initialization:
      vocab_size: 128256 # Default: 128256
      hidden_size: 256 # Default: 4096
      intermediate_size: 256 # Default: 11008
      num_hidden_layers: 2 # Default: 32
      num_attention_heads: 2 # Default: 32
      num_key_value_heads: null # Default: null

slurm:
  job_type: 'local' 
  time: "01:00:00"
  gpus_per_node: # p100:1
  mem_per_cpu: "128G"
  output: "slurm_logs/%j.out"
  open_mode: "append"
  signal: "SIGHUP@90"
  requeue: true

epochs: 40
batch_size: 1
device: cpu
