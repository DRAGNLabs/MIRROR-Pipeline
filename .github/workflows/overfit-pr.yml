name: PR Overfit Check

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  overfit-check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: |
      github.event.pull_request.author_association == 'OWNER' ||
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.author_association == 'COLLABORATOR' ||
      github.event.pull_request.author_association == 'CONTRIBUTOR'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run overfit check
        env:
          WANDB_MODE: offline
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGINGFACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
          MIRROR_DATA_PATH: ${{ github.workspace }}/.mirror_data
          MIRROR_PRINT_STEP_LOSS: "true"
        run: |
          uv run python scripts/check_overfit.py --config overfit_test_config.yaml
